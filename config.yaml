# Media Agent — Runtime Configuration

# --- Cadence ---
clips_per_day: 4
days_per_run: 7
upload_slots: ["09:00", "13:00", "17:00", "21:00"]   # canonical timezone (below)

# --- Time ---
timezone: "Asia/Singapore"

# --- Discovery ---
# Content pivot 2026-05-04: movie-clip reupload format. Old keywords archived in
# CLAUDE.md history. Niche baseline resets on first weekly run (cold start safe).
keywords:
  - "famous movie clips"
  - "new trending movie clips"
search_max_results_per_keyword: 50                    # maxResults per search.list page (API caps at 50)
discovery_max_inspected_per_keyword: 200              # total UNIQUE IDs to fetch via pagination
discovery_min_interval_hours: 6                       # cooldown for the idempotency guard
min_source_duration_seconds: 300                      # 5 minutes
recency_window_days: 30
virality_score_threshold: 1.0

# --- Models ---
whisper_model: "large-v3"                             # falls back to medium.en if VRAM tight
whisper_compute_type: "int8_float16"                  # CTranslate2 setting
whisper_device: "cuda"
ollama_model: "qwen2.5:3b-instruct"

# --- Language detection (Phase 2.5) ---
lang_detect_threshold: 0.7                            # reject iff lang!=target AND confidence>=this
lang_detect_target_lang: "en"

# --- Selection ---
clip_min_seconds: 30
clip_max_seconds: 60
clips_per_video: 2
selector_max_candidates: 25                            # cap windows passed to Ollama; long videos can produce 200+ baseline windows which overwhelm qwen2.5:3b

# --- Captions (Pivot.1 — caption-first transcript path) ---
caption_min_confidence: 0.7                            # auto-caption mean placeholder confidence below this triggers Whisper fallback
caption_prefer_manual: true                            # try manual track first; fall back to auto, then Whisper

# --- Policy ---
human_review: true                                    # locked true for first 2 weeks
banlist:
  - "suicide"
  - "self-harm"
  - "racial slur"
hook_sanity_min_score: 3                              # /5; rejects below
profanity_max_score: 5                                # better-profanity scale; tune empirically

# --- Quality ---
min_speech_density: 1.5                               # words per second
min_word_confidence: 0.6
dedup_lookback_days: 90
phash_min_hamming: 8

# --- Downloader ---
disk_soft_cap_gb: 50                                  # eviction loop runs above this (no-op until clips upload in Phase 5)
disk_hard_cap_gb: 100                                 # downloader refuses to run above this
free_disk_safety_floor_gb: 5                          # halt if filesystem free space below this
download_min_height: 720                              # reject anything below
download_max_height: 1080                             # ceiling; yt-dlp picks 1080 when available
download_estimated_bytes_per_video: 524288000         # 500 MB; fallback when probe lacks filesize

# --- Render (Pivot.3 — full-screen blurred-bg, replaces split-screen) ---
output_resolution: [1080, 1920]
render_strategy: "blurred_bg"                          # blurred_bg | center_crop | letterbox
blurred_bg_sigma: 20                                   # gblur sigma when render_strategy=blurred_bg
source_pane_aspect: "16:9"                             # for blurred_bg overlay sizing (1080:608 fg pane)
nvenc_preset: "p5"
nvenc_cq: 23
loudness_target_lufs: -14.0

# --- Copyright (movie clips have higher strike risk than podcasts) ---
copyright_acknowledgement: "movie_clips_v1"            # explicit ack of pivot risk; bootstrap --check warns if absent

# --- Quota ---
youtube_quota_daily_units: 10000
youtube_quota_ceiling_units: 9000                     # uploader aborts before crossing this
videos_insert_unit_cost: 1600
search_list_unit_cost: 100
videos_list_unit_cost: 1

# --- Retention (days) ---
retention:
  raw_video: 14
  transcript: 90
  output_post_upload: 7
  rejected_clips: 30
  dup_hashes: 90
  quota_usage: 90
  vacuum_every_days: 30

# --- Paths (rarely changed) ---
paths:
  state_db: "data/state.db"
  raw_dir: "data/raw"
  transcripts_dir: "data/transcripts"
  pending_dir: "output/pending"
  approved_dir: "output/approved"
  rejected_dir: "output/rejected"
  dry_run_dir: "output/dry_run"
  orphans_dir: "output/orphans"                       # Phase 5 orphan-marker fence; cleaned up on happy path
  logs_dir: "logs"
  oauth_token: "data/oauth_token.json"
  client_secrets: "data/client_secret.json"
