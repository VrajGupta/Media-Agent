# Media Agent — Runtime Configuration (Pivot.6)

# --- Cadence ---
clips_per_day: 4
days_per_run: 7
upload_slots: ["09:00", "13:00", "17:00", "21:00"]   # canonical timezone (below)

# --- Time ---
timezone: "Asia/Singapore"

# --- Models ---
whisper_model: "large-v3"                             # forced-alignment role only (post-Pivot.6)
whisper_compute_type: "int8_float16"                  # CTranslate2 setting
whisper_device: "cuda"
ollama_model: "qwen2.5:3b-instruct"                   # policy_gate + scripter

# --- Policy gate ---
human_review: true                                    # locked true for first 2 weeks
banlist:
  - "suicide"
  - "self-harm"
  - "racial slur"
hook_sanity_min_score: 3                              # schema-compat only; gate uses binary accept/reject
profanity_max_score: 5

# --- Quality screen ---
min_speech_density: 1.5                               # words/s — skipped for TTS audio; kept for schema compat
min_word_confidence: 0.6                              # skipped for TTS audio; kept for schema compat
dedup_lookback_days: 90
phash_min_hamming: 8

# --- Assembler / render ---
output_resolution: [1080, 1920]                       # native 9:16 from Kling — no blurred-bg needed
nvenc_preset: "p5"
nvenc_cq: 23
loudness_target_lufs: -14.0
music_enabled: true
music_volume_db: -15

# --- YouTube quota ---
youtube_quota_daily_units: 10000
youtube_quota_ceiling_units: 9000                     # uploader aborts before crossing this
videos_insert_unit_cost: 1600

# --- AI generation (Kling via OpenRouter) ---
ai_gen:
  model: "kwaivgi/kling-v3.0-std"
  per_clip_cost_cents_max: 150                        # ~$1.50/clip ceiling; abort if projection exceeds
  daily_spend_cents_ceiling: 2000                     # ~$20/day ceiling
  max_concurrent: 2                                   # Kling rate-limit safe
  shots_per_clip_min: 4
  shots_per_clip_max: 6
  shot_duration_s: 5
  style_suffix: "3D animated, Pixar-shaded surface, surreal cinematic lighting, vertical 9:16, photoreal textures with stylized characters, dark moody atmosphere"

# --- Scripter (Ollama topic-seed → JSON script) ---
scripter:
  topic_pool:
    - "weird_biology"
    - "deep_sea"
    - "weird_history"
    - "unsettling_animal_facts"
    - "rare_natural_phenomena"
  target_word_count: 80                               # ~30 s at 2.7 wps
  max_retries: 3

# --- Narration (Edge TTS) ---
narration:
  voice: "en-US-GuyNeural"
  rate: "-8%"
  pitch: "-2Hz"

# --- Subtitles (ASS burn — line-at-a-time, centered) ---
subtitles:
  position_x: 540
  position_y: 1500
  font_size: 52
  font_name: "Arial"

# --- Compliance ---
compliance:
  ai_disclosure: true                                 # YouTube altered/synthetic content attestation

# --- Retention (days) ---
retention:
  ai_gen_shots: 7                                     # Pivot.6: delete raw shots after render
  narration: 14                                       # Pivot.6: keep TTS mp3 + word timings 14 d
  scripts: 90                                         # Pivot.6: keep Ollama scripts 90 d
  output_post_upload: 7
  rejected_clips: 30
  dup_hashes: 90
  quota_usage: 90
  vacuum_every_days: 30

# --- Paths (rarely changed) ---
paths:
  state_db: "data/state.db"
  pending_dir: "output/pending"
  approved_dir: "output/approved"
  rejected_dir: "output/rejected"
  dry_run_dir: "output/dry_run"
  orphans_dir: "output/orphans"
  logs_dir: "logs"
  oauth_token: "data/oauth_token.json"
  client_secrets: "data/client_secret.json"
  ai_gen_shots_dir: "data/ai_gen_shots"
  narration_dir: "data/narration"
  scripts_dir: "data/scripts"
